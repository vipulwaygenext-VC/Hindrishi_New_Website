name: Deploy Shopify Theme

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy theme to Shopify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Shopify CLI
        run: npm install -g @shopify/cli@3.56.0 @shopify/theme@3.56.0

      - name: Deploy theme to Shopify
        env:
          CI: "true"
          SHOPIFY_STORE: ${{ secrets.SHOPIFY_STORE }}
          SHOPIFY_PASSWORD: ${{ secrets.SHOPIFY_CLI_THEME_TOKEN }}
        run: shopify theme push --store="$SHOPIFY_STORE" --password="$SHOPIFY_PASSWORD" --no-color
